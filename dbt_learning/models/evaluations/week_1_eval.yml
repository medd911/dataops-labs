unit_tests:
  - name: stg_customers_evaluation
    description: "Evaluates Task 1.3: stg_customers logic (trim name, lowercase email, cast date)"
    model: stg_customers
    given:
      - input: source('RAW', 'raw_customers')
        rows:
          - {customer_id: 'C1', first_name: '  AHMED  ', last_name: 'ALAFIFI', email: 'AHMED@EXAMPLE.COM', signup_date: '2024-01-01 10:00:00'}
    expect:
      rows:
        - {customer_id: 'C1', first_name: 'AHMED', last_name: 'ALAFIFI', email: 'ahmed@example.com', signup_date: '2024-01-01'}

  - name: stg_orders_evaluation
    description: "Evaluates Task 1.3: stg_orders logic (lower status, null shipping handling)"
    model: stg_orders
    given:
      - input: source('RAW', 'raw_orders')
        rows:
          - {order_id: 101, status: '  SHIPPED  ', order_date: '2024-04-20', shipping_fee: null}
    expect:
      rows:
        - {order_id: 101, status: 'shipped', order_date: '2024-04-20', shipping_fee: 0.0}

  - name: fct_order_details_evaluation
    description: "Evaluates Task 1.4: fct_order_details complex joins and math"
    model: fct_order_details
    given:
      - input: ref('stg_orders')
        rows:
          - {order_id: 1, customer_id: 'C1', shipping_fee: 5.0}
      - input: ref('stg_order_items')
        rows:
          - {order_id: 1, product_id: 'P1', quantity: 2, unit_price: 100.0, discount_pct: 10.0}
      - input: ref('stg_products')
        rows:
          - {product_id: 'P1', name: 'Widget', category: 'Tech'}
      - input: ref('stg_customers')
        rows:
          - {customer_id: 'C1', first_name: 'Ahmed', last_name: 'AlAfifi'}
    expect:
      rows:
        - {order_id: 1, customer_name: 'Ahmed AlAfifi', product_name: 'Widget', category: 'Tech', gross_amount: 200.0, net_amount: 180.0, total_amount: 185.0}

  - name: dim_customers_evaluation
    description: "Evaluates Task 1.5: dim_customers aggregations"
    model: dim_customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 'C1', first_name: 'Ahmed', last_name: 'AlAfifi', country: 'Oman', city: 'Muscat', signup_date: '2024-01-01'}
      - input: ref('fct_order_details')
        rows:
          - {customer_id: 'C1', total_amount: 100.0}
          - {customer_id: 'C1', total_amount: 50.0}
    expect:
      rows:
        - {customer_id: 'C1', total_orders: 2, total_spent: 150.0}
